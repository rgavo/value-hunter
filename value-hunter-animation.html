<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Value Hunter · Animation</title>
<style>
  html, body { margin: 0; padding: 0; background: radial-gradient(ellipse at 30% 20%, #1a1f2e 0%, #0c0f16 60%, #05070b 100%); color: #e8f0f8; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; height: 100%; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  /* Hide playback bar — clean auto-loop. The stage has 2 direct children: canvas-area and playback-bar. */
  .vh-stage > div > div:nth-child(2) { display: none !important; }
  /* Mac-style rounded corners + big shadow on the canvas itself */
  .vh-stage > div > div:first-child > div {
    border-radius: 12px !important;
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.08),
      0 30px 80px rgba(0,0,0,0.6),
      0 10px 30px rgba(0,0,0,0.4) !important;
  }
  /* Desktop ambience — subtle noise/grain layer behind the window */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 70% 80%, rgba(0,230,118,0.04) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
window.addEventListener('error', (e) => {
  const r = document.getElementById('root');
  if (r && (!r.firstChild || r.firstChild.tagName === 'PRE')) {
    r.innerHTML = '<pre style="color:#ff5252;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:11px;">' + (e.error && e.error.stack || e.message) + '</pre>';
  }
});
</script>

<script type="text/babel" data-presets="env,react">

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (

// Seeded deterministic random (so frames are stable)
function mulberry32(seed) {
  return function () {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Monospace ticker of random digits (used for "computing" states)
function DigitTicker({ width = 60, seed = 1, speed = 8, color = VH.muted, size = 12 }) {

  const digits = [];
  for (let i = 0; i < 8; i++) {

function SparklineRow({ seed, time }) {
  const rnd = React.useMemo(() => mulberry32(seed * 101), [seed]);
  const basePoints = React.useMemo(() => {
    const arr = [];
    for (let i = 0; i < 24; i++) arr.push(20 + rnd() * 20);
    return arr;
  }, [rnd]);

  // Shift sparkline over time to feel "live"
  const shift = Math.floor(time * 6) % 24;
  const pts = basePoints.map((_, i) => basePoints[(i + shift) % 24]);
  const w = 248, h = 36;
  const step = w / (pts.length - 1);
  const path = pts.map((v, i) => `${i === 0 ? 'M' : 'L'}${(i * step).toFixed(1)},${(h - v).toFixed(1)}`).join(' ');

  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`sg${seed}`} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={VH.green} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={VH.green} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${path} L${w},${h} L0,${h} Z`} fill={`url(#sg${seed})`}/>
      <path d={path} fill="none" stroke={VH.green} strokeWidth="1.5"/>
    </svg>
  );
}

// ── Scramble helper: returns a string that scrambles toward `final` ─────
// When t in [0, 1]: digits lock in left-to-right.
function scrambleNumber(final, t, seed = 1) {
  const s = final.toFixed(final < 10 ? 2 : 1);
  const rnd = mulberry32(seed + Math.floor(t * 30));
  let out = '';
  const lockCount = Math.floor(t * s.length);
  for (let i = 0; i < s.length; i++) {
    if (i < lockCount || s[i] === '.' || s[i] === '-' || s[i] === '+' || s[i] === '%') {
      out += s[i];
    } else {
      out += Math.floor(rnd() * 10);
    }
  }
  return out;
}

function LogLine({ line, typed, cursor }) {
  const colorMap = {
    muted: VH.muted,
    amber: VH.amber,
    green: VH.green,
    text: VH.text,
  };
  const color = colorMap[line.color] || VH.text;
  // Color the [tag] prefix separately
  const match = /^(\[[a-z]+\])(\s+)(.*)$/i.exec(typed);
  return (
    <div style={{ whiteSpace: 'pre', fontVariantNumeric: 'tabular-nums' }}>
      {match ? (
        <>
          <span style={{ color: VH.greenDim }}>{match[1]}</span>
          <span>{match[2]}</span>
          <span style={{ color }}>{match[3]}</span>
        </>
      ) : (
        <span style={{ color }}>{typed}</span>
      )}
      {cursor && <span style={{ color: VH.green, marginLeft: 2 }}>▊</span>}
    </div>
  );
}

// Big scramble-lock number readout
function BigReadout({ label, color, final, unit, locked, lockT, localTime, probPair }) {
  // Reveal 0.5s before lockT (during typing of the log line)
  const preT = lockT - 0.4;
  const reveal = clamp((localTime - preT) / 0.4, 0, 1);
  // Scramble progress 0..1 leading up to lock; then 1 after
  const scrambleStart = lockT - 0.7;
  const scrambleDur = 0.7;
  let lockProgress = clamp((localTime - scrambleStart) / scrambleDur, 0, 1);
  if (!locked && localTime < lockT) lockProgress = Math.min(lockProgress, 0.85); // don't fully lock until line fires
  const isLocked = locked && lockProgress >= 1;

  // Glow on lock
  const glowPulse = isLocked ? (1 - Math.min(1, (localTime - lockT) / 0.8)) : 0;

  // Prob pair (special 2-value readout)
  if (probPair) {
    const realStr = scrambleNumber(probPair.real * 100, lockProgress, 11);
    const fairStr = scrambleNumber(probPair.fair * 100, lockProgress, 13);
    return (
      <ReadoutShell label={label} color={color} reveal={reveal} glow={glowPulse} locked={isLocked}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, justifyContent: 'center' }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 9, color: VH.muted, letterSpacing: '0.2em', marginBottom: 2 }}>REAL</div>
            <div style={{ fontSize: 34, fontWeight: 800, color: VH.amber, lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>
              {realStr}<span style={{ fontSize: 18, color: VH.muted, marginLeft: 2 }}>%</span>
            </div>
          </div>
          <div style={{ fontSize: 18, color: VH.muted, alignSelf: 'center' }}>→</div>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 9, color: VH.muted, letterSpacing: '0.2em', marginBottom: 2 }}>FAIR</div>
            <div style={{ fontSize: 34, fontWeight: 800, color: VH.green, lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>
              {fairStr}<span style={{ fontSize: 18, color: VH.muted, marginLeft: 2 }}>%</span>
            </div>
          </div>
        </div>
      </ReadoutShell>
    );
  }

  const valStr = scrambleNumber(final, lockProgress, label.length);
  return (
    <ReadoutShell label={label} color={color} reveal={reveal} glow={glowPulse} locked={isLocked}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 8 }}>
        <span style={{
          fontSize: 54, fontWeight: 900, color, lineHeight: 1,
          letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums',
          textShadow: isLocked ? `0 0 18px ${color}66` : 'none',
        }}>
          {valStr}
        </span>
        {unit && <span style={{ fontSize: 11, color: VH.muted, letterSpacing: '0.15em' }}>{unit}</span>}
      </div>
    </ReadoutShell>
  );
}

function ReadoutShell({ label, color, reveal, glow, locked, children }) {
  return (
    <div style={{
      background: 'rgba(4,8,6,0.6)',
      border: `1px solid ${locked ? color : 'rgba(255,255,255,0.08)'}`,
      borderRadius: 6,
      padding: '12px 16px',
      opacity: reveal,
      transform: `translateX(${(1 - reveal) * 12}px)`,
      boxShadow: locked ? `0 0 ${12 + glow * 24}px ${color}${Math.floor(20 + glow * 60).toString(16).padStart(2, '0')}` : 'none',
      transition: 'box-shadow 120ms',
      flex: 1,
      display: 'flex', flexDirection: 'column', justifyContent: 'center',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* corner ticks when locked */}
      {locked && (
        <>
          <span style={{ position: 'absolute', top: -1, left: -1, width: 7, height: 7, borderTop: `2px solid ${color}`, borderLeft: `2px solid ${color}` }}/>
          <span style={{ position: 'absolute', top: -1, right: -1, width: 7, height: 7, borderTop: `2px solid ${color}`, borderRight: `2px solid ${color}` }}/>
          <span style={{ position: 'absolute', bottom: -1, left: -1, width: 7, height: 7, borderBottom: `2px solid ${color}`, borderLeft: `2px solid ${color}` }}/>
          <span style={{ position: 'absolute', bottom: -1, right: -1, width: 7, height: 7, borderBottom: `2px solid ${color}`, borderRight: `2px solid ${color}` }}/>
        </>
      )}
      <div style={{
        fontFamily: VH.mono, fontSize: 10, color: VH.muted,
        letterSpacing: '0.22em', marginBottom: 6, textAlign: 'center',
      }}>
        {label}
      </div>
      {children}
    </div>
  );
}

function EdgeReadout({ locked, lockT, localTime }) {
  const preT = lockT - 0.4;
  const reveal = clamp((localTime - preT) / 0.4, 0, 1);
  const scrambleStart = lockT - 1.0;
  let lockProgress = clamp((localTime - scrambleStart) / 1.0, 0, 1);
  if (!locked && localTime < lockT) lockProgress = Math.min(lockProgress, 0.9);
  const isLocked = locked && lockProgress >= 1;
  const val = 11.4;
  const valStr = scrambleNumber(val, lockProgress, 42);

  // After lock, threshold check appears + green pulse
  const verdictT = clamp((localTime - (lockT + 0.6)) / 0.5, 0, 1);

  return (
    <div style={{
      background: isLocked ? 'rgba(0,230,118,0.08)' : 'rgba(4,8,6,0.6)',
      border: `2px solid ${isLocked ? VH.green : 'rgba(255,255,255,0.08)'}`,
      borderRadius: 6,
      padding: '14px 16px',
      opacity: reveal,
      transform: `translateX(${(1 - reveal) * 12}px)`,
      boxShadow: isLocked ? `0 0 40px rgba(0,230,118,0.35), inset 0 0 30px rgba(0,230,118,0.08)` : 'none',
      transition: 'box-shadow 200ms, background 200ms, border-color 200ms',
      flex: 1.3,
      display: 'flex', flexDirection: 'column', justifyContent: 'center',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* animated scanline on lock */}
      {isLocked && (
        <div style={{
          position: 'absolute',
          left: 0, right: 0,
          height: 2,
          top: `${((localTime * 30) % 100)}%`,
          background: 'linear-gradient(90deg, transparent, rgba(0,230,118,0.6), transparent)',
          pointerEvents: 'none',
        }}/>
      )}
      <div style={{
        fontFamily: VH.mono, fontSize: 10, color: isLocked ? VH.green : VH.muted,
        letterSpacing: '0.25em', marginBottom: 4, textAlign: 'center', fontWeight: 700,
      }}>
        EDGE
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 6 }}>
        <span style={{
          fontSize: 68, fontWeight: 900, color: VH.green, lineHeight: 1,
          letterSpacing: '-0.03em', fontVariantNumeric: 'tabular-nums',
          textShadow: isLocked ? `0 0 24px rgba(0,230,118,0.7)` : 'none',
          fontFamily: VH.mono,
        }}>
          +{valStr}
        </span>
        <span style={{ fontSize: 22, color: VH.green, fontWeight: 700 }}>%</span>
      </div>
      {/* Verdict line */}
      <div style={{
        marginTop: 8,
        fontFamily: VH.mono, fontSize: 11, textAlign: 'center',
        opacity: verdictT,
        transform: `translateY(${(1 - verdictT) * 6}px)`,
      }}>
        <span style={{ color: VH.muted }}>threshold </span>
        <span style={{ color: VH.amber }}>5.0%</span>
        <span style={{ color: VH.green, margin: '0 8px' }}>✓</span>
        <span style={{ color: VH.green, fontWeight: 700, letterSpacing: '0.15em' }}>APPROVED</span>
      </div>
    </div>
  );
}

// Each candidate "triggers" its filter briefly — we animate a red flash on
// the filter row when the active candidate's rejection filter matches.
function FilterRow({ idx, label, localTime }) {
  // Find if any candidate is currently at the "reject moment"
  const active = React.useMemo(() => {
    for (let ci = 0; ci < CANDIDATES.length; ci++) {
      const c = CANDIDATES[ci];
      if (c.rejectFilter !== idx) continue;
      const birthTime = 1.0 + ci * 0.7;
      const rejectAt = birthTime + 0.9;
      if (localTime >= rejectAt && localTime <= rejectAt + 0.6) {
        return true;
      }
    }
    return false;
  }, [localTime, idx]);

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '7px 16px',
      background: active ? 'rgba(255,82,82,0.14)' : 'transparent',
      borderLeft: `2px solid ${active ? VH.red : 'transparent'}`,
      transition: 'all 0.1s',
    }}>
      <span style={{
        fontFamily: VH.mono, fontSize: 10,
        color: active ? VH.red : VH.muted,
        width: 18, fontWeight: 700,
      }}>
        0{idx + 1}
      </span>
      <span style={{
        fontSize: 13, color: active ? VH.red : VH.text,
        fontWeight: active ? 700 : 500,
        flex: 1,
      }}>
        {label}
      </span>
      <span style={{
        width: 10, height: 10, borderRadius: '50%',
        background: active ? VH.red : 'rgba(0,230,118,0.2)',
        border: `1px solid ${active ? VH.red : VH.borderSoft}`,
        boxShadow: active ? `0 0 8px ${VH.red}` : 'none',
      }}/>
    </div>
  );
}

// Left column: candidates stream through, get stamped REJECTED mostly, last survives
function CandidateQueue({ localTime }) {

    <div style={{
      position: 'absolute',
      left: 60, top: 150,
      width: 500,
      height: 520,
      fontFamily: VH.sans,

      }}>

        ))}

function CandidateCard({ idx, candidate, localTime }) {
  // Timing: each card enters at 1.0 + idx*0.7
  const birthTime = 1.0 + idx * 0.7;
  const enterDur = 0.4;
  const rejectAt = birthTime + 0.9;

  const t = localTime - birthTime;
  if (t < 0) return null;

  // Only show the most recent few cards, others fade out
  const lastSurvivor = idx === CANDIDATES.length - 1;

  // Position stacks at top-most slot; older ones slide down
  const slotTop = 14 + (idx * 14); // subtle stagger for old cards

  // Entry animation
  const entryP = clamp(t / enterDur, 0, 1);
  const entryX = (1 - Easing.easeOutCubic(entryP)) * -80;
  const entryO = entryP;

  // Rejection animation
  let rejectO = 0;
  let rejectScale = 1;
  let rejectX = 0;
  if (candidate.rejectFilter >= 0 && t > (rejectAt - birthTime)) {
    const rt = t - (rejectAt - birthTime);
    if (rt > 0 && rt < 0.8) {
      rejectO = clamp(rt / 0.2, 0, 1);
      if (rt > 0.5) {
        rejectX = (rt - 0.5) * 800;
        rejectO = Math.max(0, 1 - (rt - 0.5) * 3);
      }
    } else if (rt >= 0.8) {
      return null; // gone
    }
  }

  // Survivor: stays and highlights
  let glow = 0;
  if (lastSurvivor && t > 1.0) {
    glow = clamp((t - 1.0) / 0.8, 0, 1);
  }

  // Fade out if too old (only keep the survivor around)
  if (!lastSurvivor && t > 1.2) return null;

  // Layout: place active card in top slot
  const isActive = true; // only the current active is visible
  const top = 60;

  return (
    <div style={{
      position: 'absolute',
      left: 20 + entryX + rejectX, right: 20,
      top,
      opacity: entryO * (rejectO > 0 ? 1 - rejectO : 1),
      transform: `scale(${rejectScale})`,
      transformOrigin: 'center',
    }}>
      <div style={{
        background: lastSurvivor && glow > 0
          ? `linear-gradient(135deg, rgba(0,230,118,${0.1 + glow * 0.1}), rgba(0,230,118,0.03))`
          : VH.bg3,
        border: lastSurvivor && glow > 0
          ? `2px solid ${VH.green}`
          : `1px solid ${rejectO > 0 ? VH.red : VH.borderSoft}`,
        borderRadius: 8,
        padding: '18px 22px',
        boxShadow: lastSurvivor && glow > 0 ? `0 0 40px ${VH.greenGlow}` : `0 10px 30px rgba(0,0,0,0.4)`,
        transition: 'border-color 0.1s',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <span style={{
            fontFamily: VH.mono, fontSize: 10, color: VH.muted,
            letterSpacing: '0.18em',
          }}>
            CANDIDATE #{String(idx + 1).padStart(3, '0')}
          </span>
          <span style={{
            fontFamily: VH.mono, fontSize: 10, color: VH.green,
            letterSpacing: '0.15em',
          }}>
            <PulseDot size={5} speed={0.6}/> SCANNING
          </span>
        </div>
        <div style={{ fontSize: 16, fontWeight: 800, color: VH.text, marginBottom: 4, letterSpacing: '-0.01em' }}>
          {candidate.match}
        </div>
        <div style={{
          fontFamily: VH.sans, fontSize: 13, color: VH.muted,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <span>{candidate.mkt}</span>
          <span style={{ fontFamily: VH.mono, color: VH.text, fontWeight: 700 }}>@ {candidate.odd.toFixed(2)}</span>
        </div>

        {/* REJECT stamp */}
        {rejectO > 0 && candidate.rejectFilter >= 0 && (
          <div style={{
            position: 'absolute', top: 14, right: -16,
            background: VH.red,
            color: '#000',
            fontFamily: VH.mono, fontSize: 16, fontWeight: 900,
            padding: '8px 14px',
            letterSpacing: '0.2em',
            transform: `rotate(-6deg) scale(${0.8 + rejectO * 0.3})`,
            opacity: rejectO,
            boxShadow: '0 4px 20px rgba(255,82,82,0.5)',
            borderRadius: 4,
          }}>
            REJECTED
          </div>
        )}
        {rejectO > 0 && candidate.rejectNote && (
          <div style={{
            marginTop: 10,
            fontFamily: VH.mono, fontSize: 11, color: VH.red,
            opacity: rejectO,
            borderTop: `1px dashed ${VH.red}66`,
            paddingTop: 8,
          }}>
            ✗ {candidate.rejectNote}
          </div>
        )}

        {/* APPROVED stamp on survivor */}
        {lastSurvivor && glow > 0 && (
          <div style={{
            position: 'absolute', top: 14, right: -12,
            background: VH.green,
            color: '#000',
            fontFamily: VH.mono, fontSize: 16, fontWeight: 900,
            padding: '8px 14px',
            letterSpacing: '0.2em',
            transform: `rotate(-4deg) scale(${0.85 + glow * 0.25})`,
            opacity: glow,
            boxShadow: `0 4px 20px ${VH.greenGlow}`,
            borderRadius: 4,
          }}>
            APPROVED
          </div>
        )}
        {lastSurvivor && glow > 0 && (
          <div style={{
            marginTop: 10,
            fontFamily: VH.mono, fontSize: 11, color: VH.green,
            opacity: glow,
            borderTop: `1px dashed ${VH.green}66`,
            paddingTop: 8,

}

function FlyingPDF({ localTime }) {
  // First packet launches at 1.2s, arrives at phone at 3.5s
  const packets = [
    { launch: 1.2, arrive: 3.2 },
  ];

  const startX = 180, startY = 340;
  const endX = 830, endY = 350;

  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      {packets.map((p, i) => {
        if (localTime < p.launch) return null;
        if (localTime > p.arrive + 0.3) return null;

        const t = clamp((localTime - p.launch) / (p.arrive - p.launch), 0, 1);
        const eased = Easing.easeInOutCubic(t);

        // Arc trajectory
        const x = startX + (endX - startX) * eased;
        const y = startY + (endY - startY) * eased - Math.sin(eased * Math.PI) * 120;

        const scale = 0.6 + (1 - Math.abs(eased - 0.5) * 2) * 0.5;
        const rotate = -20 + eased * 40;
        const opacity = t > 0.85 ? (1 - (t - 0.85) / 0.15) : 1;

        return (
          <div key={i}>
            {/* Trail */}
            {Array.from({ length: 8 }, (_, j) => {
              const jT = Math.max(0, t - j * 0.04);
              if (jT <= 0) return null;
              const jE = Easing.easeInOutCubic(jT);
              const jX = startX + (endX - startX) * jE;
              const jY = startY + (endY - startY) * jE - Math.sin(jE * Math.PI) * 120;
              return (
                <div key={j} style={{
                  position: 'absolute',
                  left: jX, top: jY,
                  width: 8, height: 8,
                  transform: 'translate(-50%,-50%)',
                  borderRadius: '50%',
                  background: VH.green,
                  opacity: (1 - j / 8) * 0.5 * opacity,
                  boxShadow: `0 0 8px ${VH.greenGlow}`,
                }}/>
              );
            })}
            {/* The PDF */}
            <div style={{
              position: 'absolute',
              left: x, top: y,
              transform: `translate(-50%, -50%) rotate(${rotate}deg) scale(${scale})`,
              opacity,
              width: 64, height: 80,
              background: '#f6f4ef',
              borderRadius: 4,
              boxShadow: `0 10px 30px rgba(0,0,0,0.6), 0 0 30px ${VH.greenGlow}`,
              padding: '8px',
            }}>
              <div style={{ fontFamily: VH.sans, fontSize: 7, fontWeight: 900, color: '#0a0a0a' }}>
                Value<span style={{ color: VH.greenDim }}>Hunter</span>
              </div>
              <div style={{
                marginTop: 4,
                height: 2, background: '#0a0a0a', opacity: 0.6,
              }}/>
              <div style={{ marginTop: 3, height: 2, background: '#0a0a0a', opacity: 0.4 }}/>
              <div style={{ marginTop: 3, height: 2, background: '#0a0a0a', opacity: 0.4, width: '70%' }}/>
              <div style={{ marginTop: 6, height: 2, background: VH.greenDim, width: '80%' }}/>
              <div style={{ marginTop: 3, height: 2, background: '#0a0a0a', opacity: 0.3 }}/>
              <div style={{ marginTop: 3, height: 2, background: '#0a0a0a', opacity: 0.3, width: '60%' }}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Beam({ localTime }) {
  const opacity = clamp((localTime - 0.8) / 0.4, 0, 1) * clamp((5.5 - localTime) / 0.5, 0, 1);
  const phase = ((localTime * 0.6) % 1);

function Confetti({ localTime }) {
  const pieces = React.useMemo(() => {
    const rnd = mulberry32(42);
    const arr = [];
    for (let i = 0; i < 60; i++) {
      arr.push({
        x: 100 + rnd() * 1000,
        delay: rnd() * 0.8,
        angle: (rnd() - 0.5) * 80,
        speed: 120 + rnd() * 160,
        color: [VH.green, VH.greenDim, VH.text, VH.amber][Math.floor(rnd() * 4)],
        size: 4 + rnd() * 6,
        spin: (rnd() - 0.5) * 720,
        shape: rnd() > 0.5 ? 'rect' : 'circle',
      });
    }
    return arr;
  }, []);

  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      {pieces.map((p, i) => {
        const t = localTime - p.delay;
        if (t < 0) return null;
        const y = -20 + t * p.speed;
        const x = p.x + Math.sin(t * 2 + i) * 40 + p.angle * t;
        const rot = t * p.spin;
        const opacity = t > 3.5 ? Math.max(0, 1 - (t - 3.5) / 1) : 1;
        if (y > 720) return null;

        return (
          <div key={i} style={{
            position: 'absolute',
            left: x, top: y,
            width: p.size, height: p.shape === 'rect' ? p.size * 1.4 : p.size,
            background: p.color,
            borderRadius: p.shape === 'circle' ? '50%' : 1,
            transform: `rotate(${rot}deg)`,
            opacity,
            boxShadow: `0 0 6px ${p.color}66`,
          }}/>
        );
      })}
    </div>
  );
}

// ── Main composer ──
function TransitionFlash({ times }) {
  const t = useTime();
  let flashO = 0;
  for (const bt of times) {
    const d = Math.abs(t - bt);
    if (d < 0.3) flashO = Math.max(flashO, (1 - d / 0.3) * 0.18);
  }
  if (flashO <= 0) return null;
  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'radial-gradient(circle, rgba(0,230,118,0.8), transparent 70%)',
      opacity: flashO, pointerEvents: 'none', mixBlendMode: 'screen',
    }}/>
  );
}

function FilmOverlay() {
  useTime();
  return (
    <div style={{
      position: 'absolute', inset: 0, pointerEvents: 'none',
      backgroundImage: 'repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 3px)',
      mixBlendMode: 'screen',
    }}/>
  );
}

function PhaseProgress() {
  const t = useTime();
  const phases = [
    { s: 0,  e: 9  }, { s: 9,  e: 18 }, { s: 18, e: 28 },
    { s: 28, e: 38 }, { s: 38, e: 48 }, { s: 48, e: 56 },
  ];
  return (
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, display: 'flex', pointerEvents: 'none', zIndex: 30 }}>
      {phases.map((p, i) => {
        const active = t >= p.s && t <= p.e;
        const done = t > p.e;
        const progress = active ? (t - p.s) / (p.e - p.s) : (done ? 1 : 0);
        return (
          <div key={i} style={{ flex: p.e - p.s, background: 'rgba(255,255,255,0.04)', position: 'relative', marginRight: 2 }}>
            <div style={{
              position: 'absolute', left: 0, top: 0, bottom: 0,
              width: (progress * 100) + '%',
              background: active ? '#00e676' : 'rgba(0,230,118,0.3)',
              boxShadow: active ? '0 0 10px rgba(0,230,118,0.6)' : 'none',
            }}/>
          </div>
        );
      })}
    </div>
  );
}

function MacChrome() {

  const recOn = Math.floor(t * 1.6) % 2 === 0;
  return (

      boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.06)',

      zIndex: 40,

        <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#ffbd2e', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.2)' }}/>
        <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#27c93f', boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.2)' }}/>
      </div>

      {/* Title — absolutely centered so traffic lights don't push it */}
      <div style={{
        position: 'absolute', left: 0, right: 0, textAlign: 'center',
        pointerEvents: 'none',
      }}>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 10,
          fontSize: 13, color: 'rgba(255,255,255,0.85)', fontWeight: 600,
          letterSpacing: '-0.005em',
        }}>
          {/* Recording dot */}
          <span style={{
            width: 8, height: 8, borderRadius: '50%',
            background: recOn ? '#ff3b30' : 'rgba(255,59,48,0.25)',

          }}/>

            fontFamily: 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace',
            fontSize: 12, color: '#00e676', fontWeight: 700,
          }}>
            ValueHunter

          <span style={{ color: 'rgba(255,255,255,0.4)' }}>—</span>
          <span style={{
            fontFamily: 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace',
            fontSize: 12, color: 'rgba(255,255,255,0.7)',

            live_scanner.app

        </div>
      </div>

      {/* Right side: connection indicator */}
      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
        <span style={{
          fontFamily: 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace',
          fontSize: 10, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.1em',
        }}>
          {Math.floor(t).toString().padStart(2, '0')}:{Math.floor((t * 100) % 100).toString().padStart(2, '0')}
        </span>
      </div>
    </div>
  );
}

function App() {

    <div className="vh-stage" style={{ position: 'absolute', inset: 0, zIndex: 1 }}>
